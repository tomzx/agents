# LLM-Augmented Workflows configuration.
#
# End-to-end automation of the full SDLC pipeline for both feature requests and
# bug fixes, modelled on the `sdlc` skill (skills/sdlc/SKILL.md).
#
# Design
# ------
# The engine is stateless; all state lives in GitHub. The pipeline is encoded as
# a label state-machine: each phase is split into a create step (drafts the
# artifact) and a review step (gates it). All flow labels are namespaced with
# the `llmaw:` prefix so they never collide with human labels.
#
#   issue opened -> triage (verdict: feature | bug | needs-info | other)
#
#   Transient triggers drive every create step: a review rule (or a merge rule,
#   or triage) emits a llmaw:create-<step> label that the matching create rule
#   consumes on entry. On "changes-requested" the review rule re-adds the SAME
#   create-<step> label, re-firing the create skill in revision mode (see
#   skills/sdlc/references/shared.md -> Revision Mode). Milestone labels
#   (*-approved, shipped, bug-fixed) are durable audit records only, never
#   triggers.
#
#   FEATURE (each phase: create drafts -> review gates):
#     triage: feature-request (classify) + create-needs-assessment (trigger)
#       [create-needs-assessment]   -> review-needs-assessment [review-needs-assessment]
#         approved          -> needs-approved + create-requirements
#         changes-requested -> create-needs-assessment (revise)
#       [create-requirements]       -> review-requirements
#         approved          -> requirements-approved + create-existing-solutions
#         changes-requested -> create-requirements (revise)
#       ... existing-solutions, codebase-analysis, feasibility ...
#       [create-specifications]     -> review-specifications
#         -> spec-approved + create-telemetry
#       ... telemetry, observability ...
#       [create-observability]      -> review-observability
#         -> observability-approved + create-plan
#       [create-plan]               -> review-plan
#         -> publish-plan (plan PR) --merge--> plan-approved + create-tasks-decomposition
#       [create-tasks-decomposition]-> review-tasks-decomposition
#         -> tasks-approved + create-tests
#       [create-tests]              -> review-tests
#         -> tests-approved + create-implementation
#       [create-implementation] (impl PR) --merge--> shipped + finished (-> learnings)
#       [create-learnings]
#
#   BUGFIX:  llmaw:bug -> check-duplicates -> reproduce -> [fix PR]
#            --merge--> llmaw:bug-fixed + llmaw:finished -> learnings
#            (no review-* pairs; the fix PR is gated by review-pr.)
#
# Rules
#  - One agent step per rule. Phases chain via transient triggers: a create rule
#    consumes a `create-<step>` label on entry and emits a `review-<step>` label;
#    the review rule consumes that on entry and, on `approved`, emits the next
#    `create-<step>` (plus the durable milestone); on `changes-requested` it
#    re-emits the SAME `create-<step>`, re-firing create in revision mode.
#  - Two label families:
#      * transient triggers — `create-<step>` and `review-<step>`: consumed on
#        entry by the rule that matches them, so they are re-addable and drive
#        every phase transition (including revise loops).
#      * durable milestones — `*-approved`, `shipped`, `bug-*`, `finished`:
#        accumulate as a completion/audit record, are NEVER removed, and are
#        NEVER used as triggers (a durable label can't be re-added, so it can't
#        drive a revise loop). The lone exception is the terminal learnings
#        step, which has no review gate and is triggered by `shipped` /
#        `bug-fixed` stamped at PR merge.
#  - Routing is outcome-driven: each skill writes a YAML verdict to
#    $OUTCOME_YAML (approved | rejected | changes-requested | needs-info | ...),
#    and an `on_outcome` step after the skill maps it to the next label / close /
#    comment. Skills never reference llmaw: labels, so the same skill works in
#    interactive `/sdlc` and here. The `_` case is the fallback when no verdict
#    matches (surfaces the issue for human review). Skill names assume the
#    agents repository (AGENTS_REPOSITORY) exposes the SDLC skill set.
#  - Review verdicts: approved advances (milestone + next create-<step>);
#    changes-requested re-fires the same create-<step> in revision mode (findings
#    are persisted to .sdlc/ by the review skill and posted as a comment);
#    rejected closes.
#  - Per-issue working branch: every artifact phase runs `ensure-branch.sh`
#    first (checks out or creates `sdlc/issue-<N>`), then `commit-sdlc.sh` after
#    (commits .sdlc/ and pushes). The branch is the cross-run persistence for the
#    .sdlc/ artifact chain, since the engine is stateless and each rule run
#    starts from a fresh checkout. The branch name is derived from ISSUE_NUMBER,
#    so no separate state is needed to locate it. Phases that open their own PR
#    (publish-plan, create-implementation) still read upstream artifacts from the
#    working branch; commit-sdlc no-ops if the skill switched to its PR branch.
#  - The plan PR is the publish-plan human sign-off gate (gated upstream by
#    review-plan): merging it labels the linked issue `llmaw:plan-approved` plus
#    `llmaw:create-tasks-decomposition`.
#    Implementation/fix PRs use `closes #N`, so GitHub auto-closes the linked
#    issue on merge.
#
# Triggered events (declared in the wrapper workflow):
#   issues: opened | labeled | reopened | closed
#   pull_request: closed | labeled | ready_for_review
#   issue_comment: created
#   pull_request_review_comment: created
#
# Any phase can be (re)started by manually adding its label, or force-run from
# the Actions tab via the dispatcher's `rule-id` input.

defaults:
  model: opencode/deepseek-v4-flash-free   # opencode model id (provider/model)
  agents_repository: tomzx/agents          # repo providing skills, cloned at runtime
  timeout_minutes: 30
  # execution: event-driven                 # or "continuous": chain rules in one job
                                            # until llmaw:needs-human (see docs/flows.md)

# Labels auto-created/updated by the setup-labels workflow.
labels:
  # --- entry / classification ---
  - name: llmaw:feature-request
    description: Triaged as a feature request; enters the feature pipeline
    color: 1D76DB
  - name: llmaw:bug
    description: Triaged as a bug; enters the bug-fix pipeline
    color: D73A4A

  # --- feature: transient "create step" triggers (consumed by the create rule on entry) ---
  - name: llmaw:create-needs-assessment
    description: Run create-needs-assessment (draft or revise)
    color: FBCA04
  - name: llmaw:create-requirements
    description: Run create-requirements (draft or revise)
    color: FBCA04
  - name: llmaw:create-existing-solutions
    description: Run create-existing-solutions (draft or revise)
    color: FBCA04
  - name: llmaw:create-codebase-analysis
    description: Run create-codebase-analysis (draft or revise)
    color: FBCA04
  - name: llmaw:create-feasibility
    description: Run create-feasibility (draft or revise)
    color: FBCA04
  - name: llmaw:create-specifications
    description: Run create-specifications (draft or revise)
    color: FBCA04
  - name: llmaw:create-telemetry
    description: Run create-telemetry (draft or revise)
    color: FBCA04
  - name: llmaw:create-observability
    description: Run create-observability (draft or revise)
    color: FBCA04
  - name: llmaw:create-plan
    description: Run create-plan (draft or revise)
    color: FBCA04
  - name: llmaw:publish-plan
    description: Run publish-plan (open plan PR)
    color: FBCA04
  - name: llmaw:create-tasks-decomposition
    description: Run create-tasks-decomposition (draft or revise)
    color: FBCA04
  - name: llmaw:create-tests
    description: Run create-tests (draft or revise)
    color: FBCA04
  - name: llmaw:create-implementation
    description: Run create-implementation (open impl PR)
    color: FBCA04

  # --- feature: transient "artifact drafted, awaiting review" (consumed by the review rule) ---
  - name: llmaw:review-needs-assessment
    description: Needs assessment drafted; awaiting review
    color: FBCA04
  - name: llmaw:review-requirements
    description: Requirements drafted; awaiting review
    color: FBCA04
  - name: llmaw:review-existing-solutions
    description: Existing-solutions survey drafted; awaiting review
    color: FBCA04
  - name: llmaw:review-codebase-analysis
    description: Codebase analysis drafted; awaiting review
    color: FBCA04
  - name: llmaw:review-feasibility
    description: Feasibility assessment drafted; awaiting review
    color: FBCA04
  - name: llmaw:review-specifications
    description: Specification drafted; awaiting review
    color: FBCA04
  - name: llmaw:review-telemetry
    description: Telemetry plan drafted; awaiting review
    color: FBCA04
  - name: llmaw:review-observability
    description: Observability plan drafted; awaiting review
    color: FBCA04
  - name: llmaw:review-plan
    description: Plan drafted; awaiting review
    color: FBCA04
  - name: llmaw:review-tasks-decomposition
    description: Task decomposition drafted; awaiting review
    color: FBCA04
  - name: llmaw:review-tests
    description: Test plan drafted; awaiting review
    color: FBCA04

  # --- feature: durable milestones (review-approved; accumulate, never removed) ---
  - name: llmaw:needs-approved
    description: Needs assessment approved; ready for requirements
    color: 0E8A16
  - name: llmaw:requirements-approved
    description: Requirements approved; ready for existing-solutions survey
    color: 0E8A16
  - name: llmaw:solutions-approved
    description: Existing-solutions survey approved; ready for codebase analysis
    color: 0E8A16
  - name: llmaw:analysis-approved
    description: Codebase analysis approved; ready for feasibility
    color: 0E8A16
  - name: llmaw:feasible
    description: Feasibility approved; ready for specification
    color: 0E8A16
  - name: llmaw:spec-approved
    description: Specification approved; ready for telemetry
    color: 5319E7
  - name: llmaw:telemetry-approved
    description: Telemetry plan approved; ready for observability
    color: 5319E7
  - name: llmaw:observability-approved
    description: Observability plan approved; ready for planning
    color: 5319E7
  - name: llmaw:plan-approved
    description: Plan PR merged (author sign-off); ready for task decomposition
    color: 5319E7
  - name: llmaw:tasks-approved
    description: Tasks approved; ready for test design
    color: FBCA04
  - name: llmaw:tests-approved
    description: Test plan approved; ready for implementation
    color: FBCA04
  - name: llmaw:shipped
    description: Implementation merged; ready for learnings
    color: 0E8A16

  # --- bugfix milestones ---
  - name: llmaw:bug-verified
    description: Duplicate check done; ready to reproduce
    color: FBCA04
  - name: llmaw:bug-reproduced
    description: Bug reproduced; ready for fix
    color: FBCA04
  - name: llmaw:bug-fixed
    description: Fix merged; ready for learnings
    color: 0E8A16

  # --- human intervention (skill returned no verdict) ---
  - name: llmaw:needs-human
    description: Skill returned no verdict; needs human intervention to proceed
    color: D93F0B

  # --- terminal (stamped deterministically at PR merge) ---
  - name: llmaw:finished
    description: Flow completed (PR merged); terminal marker shared by all flows
    color: 0E8A16

flows:
  triage:
    description: Classify every new issue and route it into a pipeline.
    rules:
      - id: triage-new-issue
        when: { event: issues, action: opened }
        run:
          # Writes verdict: feature | bug | needs-info | other.
          - skill: triage-issue
          - on_outcome:
              feature:    { labels: { add: [llmaw:feature-request, llmaw:create-needs-assessment] } }
              bug:        { labels: { add: [llmaw:bug] } }
              needs-info: { comment: "Need more information to classify this issue.", post_reason: true }
              other:      {}   # question/chore/docs/security: triaged, no pipeline
              _:          { labels: { add: [llmaw:needs-human] }, comment: "Triage produced no verdict; needs review." }

  feature:
    description: Full SDLC pipeline; each phase drafts (create-*) then gates (review-*).
    execution: continuous
    rules:
      # --- Stage: needs validation ---
      - id: feat-needs-create
        when: { event: issues, action: labeled, label: llmaw:create-needs-assessment }
        run:
          - shell: .github/llmaw/scripts/ensure-branch.sh
          - skill: create-needs-assessment
          - shell: [.github/llmaw/scripts/commit-sdlc.sh, "draft needs assessment"]
          - labels: { remove: [llmaw:create-needs-assessment] }
          - on_outcome:
              approved:   { labels: { add: [llmaw:review-needs-assessment] } }
              rejected:   { close: true, comment: "Closing as wontfix.", post_reason: true }
              needs-info: { comment: "Need more information to assess this need.", post_reason: true }
              _:          { labels: { add: [llmaw:needs-human] }, comment: "Needs assessment produced no verdict; needs review." }
      - id: feat-needs-review
        when: { event: issues, action: labeled, label: llmaw:review-needs-assessment }
        run:
          - shell: .github/llmaw/scripts/ensure-branch.sh
          - skill: review-needs-assessment
          - shell: [.github/llmaw/scripts/commit-sdlc.sh, "review needs assessment"]
          - labels: { remove: [llmaw:review-needs-assessment] }
          - on_outcome:
              approved:          { labels: { add: [llmaw:needs-approved, llmaw:create-requirements] } }
              changes-requested: { labels: { add: [llmaw:create-needs-assessment] }, comment: "Needs assessment has findings to address; revising.", post_reason: true }
              rejected:          { close: true, comment: "Closing: needs assessment rejected.", post_reason: true }
              _:                 { labels: { add: [llmaw:needs-human] }, comment: "Needs-assessment review produced no verdict." }

      # --- Stage: requirements & research ---
      - id: feat-requirements-create
        when: { event: issues, action: labeled, label: llmaw:create-requirements }
        run:
          - shell: .github/llmaw/scripts/ensure-branch.sh
          - skill: create-requirements
          - shell: [.github/llmaw/scripts/commit-sdlc.sh, "draft requirements"]
          - labels: { remove: [llmaw:create-requirements] }
          - on_outcome:
              approved:   { labels: { add: [llmaw:review-requirements] } }
              needs-info: { comment: "Need clarification to draft requirements.", post_reason: true }
              _:          { labels: { add: [llmaw:needs-human] }, comment: "Requirements produced no verdict; needs review." }
      - id: feat-requirements-review
        when: { event: issues, action: labeled, label: llmaw:review-requirements }
        run:
          - shell: .github/llmaw/scripts/ensure-branch.sh
          - skill: review-requirements
          - shell: [.github/llmaw/scripts/commit-sdlc.sh, "review requirements"]
          - labels: { remove: [llmaw:review-requirements] }
          - on_outcome:
              approved:          { labels: { add: [llmaw:requirements-approved, llmaw:create-existing-solutions] } }
              changes-requested: { labels: { add: [llmaw:create-requirements] }, comment: "Requirements have findings to address; revising.", post_reason: true }
              rejected:          { close: true, comment: "Closing: requirements rejected.", post_reason: true }
              _:                 { labels: { add: [llmaw:needs-human] }, comment: "Requirements review produced no verdict." }

      - id: feat-existing-solutions-create
        when: { event: issues, action: labeled, label: llmaw:create-existing-solutions }
        run:
          - shell: .github/llmaw/scripts/ensure-branch.sh
          - skill: create-existing-solutions
          - shell: [.github/llmaw/scripts/commit-sdlc.sh, "draft existing-solutions survey"]
          - labels: { remove: [llmaw:create-existing-solutions] }
          - on_outcome:
              approved: { labels: { add: [llmaw:review-existing-solutions] } }
              _:        { labels: { add: [llmaw:needs-human] }, comment: "Existing-solutions survey produced no verdict; needs review." }
      - id: feat-existing-solutions-review
        when: { event: issues, action: labeled, label: llmaw:review-existing-solutions }
        run:
          - shell: .github/llmaw/scripts/ensure-branch.sh
          - skill: review-existing-solutions
          - shell: [.github/llmaw/scripts/commit-sdlc.sh, "review existing-solutions survey"]
          - labels: { remove: [llmaw:review-existing-solutions] }
          - on_outcome:
              approved:          { labels: { add: [llmaw:solutions-approved, llmaw:create-codebase-analysis] } }
              changes-requested: { labels: { add: [llmaw:create-existing-solutions] }, comment: "Existing-solutions survey has findings to address; revising.", post_reason: true }
              rejected:          { close: true, comment: "Closing: existing-solutions survey rejected.", post_reason: true }
              _:                 { labels: { add: [llmaw:needs-human] }, comment: "Existing-solutions review produced no verdict." }

      - id: feat-codebase-analysis-create
        when: { event: issues, action: labeled, label: llmaw:create-codebase-analysis }
        run:
          - shell: .github/llmaw/scripts/ensure-branch.sh
          - skill: create-codebase-analysis
          - shell: [.github/llmaw/scripts/commit-sdlc.sh, "draft codebase analysis"]
          - labels: { remove: [llmaw:create-codebase-analysis] }
          - on_outcome:
              approved: { labels: { add: [llmaw:review-codebase-analysis] } }
              _:        { labels: { add: [llmaw:needs-human] }, comment: "Codebase analysis produced no verdict; needs review." }
      - id: feat-codebase-analysis-review
        when: { event: issues, action: labeled, label: llmaw:review-codebase-analysis }
        run:
          - shell: .github/llmaw/scripts/ensure-branch.sh
          - skill: review-codebase-analysis
          - shell: [.github/llmaw/scripts/commit-sdlc.sh, "review codebase analysis"]
          - labels: { remove: [llmaw:review-codebase-analysis] }
          - on_outcome:
              approved:          { labels: { add: [llmaw:analysis-approved, llmaw:create-feasibility] } }
              changes-requested: { labels: { add: [llmaw:create-codebase-analysis] }, comment: "Codebase analysis has findings to address; revising.", post_reason: true }
              rejected:          { close: true, comment: "Closing: codebase analysis rejected.", post_reason: true }
              _:                 { labels: { add: [llmaw:needs-human] }, comment: "Codebase-analysis review produced no verdict." }

      - id: feat-feasibility-create
        when: { event: issues, action: labeled, label: llmaw:create-feasibility }
        run:
          - shell: .github/llmaw/scripts/ensure-branch.sh
          - skill: create-feasibility
          - shell: [.github/llmaw/scripts/commit-sdlc.sh, "draft feasibility assessment"]
          - labels: { remove: [llmaw:create-feasibility] }
          - on_outcome:
              approved: { labels: { add: [llmaw:review-feasibility] } }
              rejected: { close: true, comment: "Closing as not feasible.", post_reason: true }
              _:        { labels: { add: [llmaw:needs-human] }, comment: "Feasibility produced no verdict; needs review." }
      - id: feat-feasibility-review
        when: { event: issues, action: labeled, label: llmaw:review-feasibility }
        run:
          - shell: .github/llmaw/scripts/ensure-branch.sh
          - skill: review-feasibility
          - shell: [.github/llmaw/scripts/commit-sdlc.sh, "review feasibility assessment"]
          - labels: { remove: [llmaw:review-feasibility] }
          - on_outcome:
              approved:          { labels: { add: [llmaw:feasible, llmaw:create-specifications] } }
              changes-requested: { labels: { add: [llmaw:create-feasibility] }, comment: "Feasibility assessment has findings to address; revising.", post_reason: true }
              rejected:          { close: true, comment: "Closing: feasibility rejected (no-go).", post_reason: true }
              _:                 { labels: { add: [llmaw:needs-human] }, comment: "Feasibility review produced no verdict." }

      # --- Stage: design ---
      - id: feat-specification-create
        when: { event: issues, action: labeled, label: llmaw:create-specifications }
        run:
          - shell: .github/llmaw/scripts/ensure-branch.sh
          - skill: create-specifications
          - shell: [.github/llmaw/scripts/commit-sdlc.sh, "draft specification"]
          - labels: { remove: [llmaw:create-specifications] }
          - on_outcome:
              approved: { labels: { add: [llmaw:review-specifications] } }
              _:        { labels: { add: [llmaw:needs-human] }, comment: "Specification produced no verdict; needs review." }
      - id: feat-specification-review
        when: { event: issues, action: labeled, label: llmaw:review-specifications }
        run:
          - shell: .github/llmaw/scripts/ensure-branch.sh
          - skill: review-specifications
          - shell: [.github/llmaw/scripts/commit-sdlc.sh, "review specification"]
          - labels: { remove: [llmaw:review-specifications] }
          - on_outcome:
              approved:          { labels: { add: [llmaw:spec-approved, llmaw:create-telemetry] } }
              changes-requested: { labels: { add: [llmaw:create-specifications] }, comment: "Specification has findings to address; revising.", post_reason: true }
              rejected:          { close: true, comment: "Closing: specification rejected.", post_reason: true }
              _:                 { labels: { add: [llmaw:needs-human] }, comment: "Specification review produced no verdict." }

      - id: feat-telemetry-create
        when: { event: issues, action: labeled, label: llmaw:create-telemetry }
        run:
          - shell: .github/llmaw/scripts/ensure-branch.sh
          - skill: create-telemetry
          - shell: [.github/llmaw/scripts/commit-sdlc.sh, "draft telemetry plan"]
          - labels: { remove: [llmaw:create-telemetry] }
          - on_outcome:
              approved: { labels: { add: [llmaw:review-telemetry] } }
              _:        { labels: { add: [llmaw:needs-human] }, comment: "Telemetry plan produced no verdict; needs review." }
      - id: feat-telemetry-review
        when: { event: issues, action: labeled, label: llmaw:review-telemetry }
        run:
          - shell: .github/llmaw/scripts/ensure-branch.sh
          - skill: review-telemetry
          - shell: [.github/llmaw/scripts/commit-sdlc.sh, "review telemetry plan"]
          - labels: { remove: [llmaw:review-telemetry] }
          - on_outcome:
              approved:          { labels: { add: [llmaw:telemetry-approved, llmaw:create-observability] } }
              changes-requested: { labels: { add: [llmaw:create-telemetry] }, comment: "Telemetry plan has findings to address; revising.", post_reason: true }
              rejected:          { close: true, comment: "Closing: telemetry plan rejected.", post_reason: true }
              _:                 { labels: { add: [llmaw:needs-human] }, comment: "Telemetry review produced no verdict." }

      - id: feat-observability-create
        when: { event: issues, action: labeled, label: llmaw:create-observability }
        run:
          - shell: .github/llmaw/scripts/ensure-branch.sh
          - skill: create-observability
          - shell: [.github/llmaw/scripts/commit-sdlc.sh, "draft observability plan"]
          - labels: { remove: [llmaw:create-observability] }
          - on_outcome:
              approved: { labels: { add: [llmaw:review-observability] } }
              _:        { labels: { add: [llmaw:needs-human] }, comment: "Observability plan produced no verdict; needs review." }
      - id: feat-observability-review
        when: { event: issues, action: labeled, label: llmaw:review-observability }
        run:
          - shell: .github/llmaw/scripts/ensure-branch.sh
          - skill: review-observability
          - shell: [.github/llmaw/scripts/commit-sdlc.sh, "review observability plan"]
          - labels: { remove: [llmaw:review-observability] }
          - on_outcome:
              approved:          { labels: { add: [llmaw:observability-approved, llmaw:create-plan] } }
              changes-requested: { labels: { add: [llmaw:create-observability] }, comment: "Observability plan has findings to address; revising.", post_reason: true }
              rejected:          { close: true, comment: "Closing: observability plan rejected.", post_reason: true }
              _:                 { labels: { add: [llmaw:needs-human] }, comment: "Observability review produced no verdict." }

      # --- Stage: plan (create -> review -> publish PR as human sign-off gate) ---
      - id: feat-plan-create
        when: { event: issues, action: labeled, label: llmaw:create-plan }
        run:
          - shell: .github/llmaw/scripts/ensure-branch.sh
          - skill: create-plan
          - shell: [.github/llmaw/scripts/commit-sdlc.sh, "draft plan"]
          - labels: { remove: [llmaw:create-plan] }
          - on_outcome:
              approved: { labels: { add: [llmaw:review-plan] } }
              _:        { labels: { add: [llmaw:needs-human] }, comment: "Plan creation produced no verdict; needs review." }
      - id: feat-plan-review
        when: { event: issues, action: labeled, label: llmaw:review-plan }
        run:
          - shell: .github/llmaw/scripts/ensure-branch.sh
          - skill: review-plan
          - shell: [.github/llmaw/scripts/commit-sdlc.sh, "review plan"]
          - labels: { remove: [llmaw:review-plan] }
          - on_outcome:
              approved:          { labels: { add: [llmaw:publish-plan] } }
              changes-requested: { labels: { add: [llmaw:create-plan] }, comment: "Plan has findings to address; revising.", post_reason: true }
              rejected:          { close: true, comment: "Closing: plan rejected.", post_reason: true }
              _:                 { labels: { add: [llmaw:needs-human] }, comment: "Plan review produced no verdict." }
      - id: feat-plan-publish
        when: { event: issues, action: labeled, label: llmaw:publish-plan }
        run:
          - shell: .github/llmaw/scripts/ensure-branch.sh
          # publish-plan opens a draft plan/ PR. Its merge (on-plan-merged)
          # advances the flow, so approved is a no-op here.
          - skill: publish-plan
          - labels: { remove: [llmaw:publish-plan] }
          - on_outcome:
              approved: {}
              _:        { labels: { add: [llmaw:needs-human] }, comment: "Plan publish produced no PR; needs review." }

      # publish-plan gate: plan PR merged -> advance the linked issue.
      - id: on-plan-merged
        when: { event: pull_request, action: closed, merged: true, branch_prefix: plan/ }
        run:
          - labels: { add: [llmaw:plan-approved, llmaw:create-tasks-decomposition], target: linked-issue }

      # --- Stage: build ---
      - id: feat-tasks-create
        when: { event: issues, action: labeled, label: llmaw:create-tasks-decomposition }
        run:
          - shell: .github/llmaw/scripts/ensure-branch.sh
          - skill: create-tasks-decomposition
          - shell: [.github/llmaw/scripts/commit-sdlc.sh, "draft task decomposition"]
          - labels: { remove: [llmaw:create-tasks-decomposition] }
          - on_outcome:
              approved: { labels: { add: [llmaw:review-tasks-decomposition] } }
              _:        { labels: { add: [llmaw:needs-human] }, comment: "Task decomposition produced no verdict; needs review." }
      - id: feat-tasks-review
        when: { event: issues, action: labeled, label: llmaw:review-tasks-decomposition }
        run:
          - shell: .github/llmaw/scripts/ensure-branch.sh
          - skill: review-tasks-decomposition
          - shell: [.github/llmaw/scripts/commit-sdlc.sh, "review task decomposition"]
          - labels: { remove: [llmaw:review-tasks-decomposition] }
          - on_outcome:
              approved:          { labels: { add: [llmaw:tasks-approved, llmaw:create-tests] } }
              changes-requested: { labels: { add: [llmaw:create-tasks-decomposition] }, comment: "Task decomposition has findings to address; revising.", post_reason: true }
              rejected:          { close: true, comment: "Closing: task decomposition rejected.", post_reason: true }
              _:                 { labels: { add: [llmaw:needs-human] }, comment: "Task-decomposition review produced no verdict." }

      - id: feat-tests-create
        when: { event: issues, action: labeled, label: llmaw:create-tests }
        run:
          - shell: .github/llmaw/scripts/ensure-branch.sh
          - skill: create-tests
          - shell: [.github/llmaw/scripts/commit-sdlc.sh, "draft test plan"]
          - labels: { remove: [llmaw:create-tests] }
          - on_outcome:
              approved: { labels: { add: [llmaw:review-tests] } }
              _:        { labels: { add: [llmaw:needs-human] }, comment: "Test plan produced no verdict; needs review." }
      - id: feat-tests-review
        when: { event: issues, action: labeled, label: llmaw:review-tests }
        run:
          - shell: .github/llmaw/scripts/ensure-branch.sh
          - skill: review-tests
          - shell: [.github/llmaw/scripts/commit-sdlc.sh, "review test plan"]
          - labels: { remove: [llmaw:review-tests] }
          - on_outcome:
              approved:          { labels: { add: [llmaw:tests-approved, llmaw:create-implementation] } }
              changes-requested: { labels: { add: [llmaw:create-tests] }, comment: "Test plan has findings to address; revising.", post_reason: true }
              rejected:          { close: true, comment: "Closing: test plan rejected.", post_reason: true }
              _:                 { labels: { add: [llmaw:needs-human] }, comment: "Test-plan review produced no verdict." }

      - id: feat-implementation
        when: { event: issues, action: labeled, label: llmaw:create-implementation }
        run:
          - shell: .github/llmaw/scripts/ensure-branch.sh
          # create-implementation opens an impl/ PR. Its merge (on-impl-merged)
          # advances the flow, so approved is a no-op. The PR is gated by
          # review-pr (see the review flow, on ready_for_review).
          - skill: create-implementation
          - shell: [.github/llmaw/scripts/commit-sdlc.sh, "draft implementation"]
          - labels: { remove: [llmaw:create-implementation] }
          - on_outcome:
              approved: {}
              _:        { labels: { add: [llmaw:needs-human] }, comment: "Implementation produced no PR; needs review." }

      # Implementation PR merged -> GitHub auto-closes via `closes #N`;
      # stamp `llmaw:shipped` (triggers learnings) + `llmaw:finished`.
      - id: on-impl-merged
        when: { event: pull_request, action: closed, merged: true, branch_prefix: impl/ }
        run:
          - labels: { add: [llmaw:shipped, llmaw:finished], target: linked-issue }

      # --- Stage: learnings (close-out) ---
      - id: feat-learnings
        when: { event: issues, action: labeled, label: llmaw:shipped }
        run:
          - shell: .github/llmaw/scripts/ensure-branch.sh
          - skill: create-learnings               # terminal
          - shell: [.github/llmaw/scripts/commit-sdlc.sh, "record learnings"]

  bug:
    description: SDLC bug-fix fast path (check-duplicates -> reproduce -> fix -> PR).
    execution: continuous
    rules:
      - id: bug-duplicates
        when: { event: issues, action: labeled, label: llmaw:bug }
        run:
          # Writes verdict: novel | duplicate.
          - skill: check-duplicates
          - on_outcome:
              novel:     { labels: { add: [llmaw:bug-verified] } }
              duplicate: { close: true, comment: "Closing as duplicate.", post_reason: true }
              _:         { labels: { add: [llmaw:needs-human] }, comment: "Duplicate check produced no verdict; needs review." }

      - id: bug-reproduce
        when: { event: issues, action: labeled, label: llmaw:bug-verified }
        run:
          # Creates a worktree, attempts reproduction, posts results.
          - skill: reproduce-issue
          - on_outcome:
              reproduced:       { labels: { add: [llmaw:bug-reproduced] } }
              cannot-reproduce: { comment: "Could not reproduce; need more information.", post_reason: true }
              _:                { labels: { add: [llmaw:needs-human] }, comment: "Reproduction produced no verdict; needs review." }

      - id: bug-fix
        when: { event: issues, action: labeled, label: llmaw:bug-reproduced }
        run:
          # fix-issue opens a fix/ PR. Its merge (on-fix-merged) advances the
          # flow, so approved is a no-op. The PR is gated by review-pr.
          - skill: fix-issue
          - on_outcome:
              approved: {}
              _:        { labels: { add: [llmaw:needs-human] }, comment: "Fix produced no PR; needs review." }

      # Fix PR merged -> GitHub auto-closes via `closes #N`;
      # stamp `llmaw:bug-fixed` (triggers learnings) + `llmaw:finished`.
      - id: on-fix-merged
        when: { event: pull_request, action: closed, merged: true, branch_prefix: fix/ }
        run:
          - labels: { add: [llmaw:bug-fixed, llmaw:finished], target: linked-issue }

      - id: bug-learnings
        when: { event: issues, action: labeled, label: llmaw:bug-fixed }
        run:
          - shell: .github/llmaw/scripts/ensure-branch.sh
          - skill: create-learnings               # terminal
          - shell: [.github/llmaw/scripts/commit-sdlc.sh, "record learnings"]

  review:
    description: Automated PR review and interactive comment handling.
    rules:
      # Automated review when a human marks an agent PR ready (draft -> ready).
      - id: review-pr
        when: { event: pull_request, action: ready_for_review }
        run:
          - skill: review-pr

      # Inline review comment on a plan PR -> address plan feedback.
      - id: handle-pr-feedback
        when: { event: pull_request_review_comment, action: created }
        run:
          - skill: handle-pr-feedback
